<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Convoy</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <header class="hero">
    <img src="./Convoy.jpg" alt="Convoy logo" class="logo" />
    <div>
      <h1>Convoy</h1>
      <p>Users, convoys, friends, messaging, and GPS in one demo.</p>
    </div>
  </header>

  <main class="grid">

    <!-- CREATE USER -->
    <section class="card">
      <h2>Create User</h2>
      <form id="registerForm" class="stack">
        <input id="regUserName" placeholder="Username" required />
        <input id="regFirstName" placeholder="First name" required />
        <input id="regLastName" placeholder="Last name" required />
        <input id="regEmail" type="email" placeholder="Email" required />
        <input id="regPassword" type="password" placeholder="Password" required />
        <button type="submit">Create User</button>
      </form>
      <p id="registerResult" class="result"></p>
    </section>

    <!-- LOGIN -->
    <section class="card">
      <h2>Login</h2>
      <form id="loginForm" class="stack">
        <input id="loginUserName" placeholder="Username" required />
        <input id="loginPassword" type="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>

      <div class="row gap small-top">
        <button id="logoutBtn" type="button">Logout</button>
      </div>

      <p id="loginResult" class="result"></p>
      <p id="currentUser" class="current-user">Not logged in.</p>
    </section>

    <!-- CONVOYS -->
    <section class="card">
      <h2>Create / Join Convoy</h2>

      <form id="createConvoyForm" class="stack">
        <input id="convoyName" placeholder="Convoy name" required />
        <input id="createJoinCode" placeholder="Join code" required />
        <button type="submit">Create Convoy</button>
      </form>

      <form id="joinConvoyForm" class="stack small-top">
        <input id="joinCode" placeholder="Join code" required />
        <button type="submit">Join Convoy</button>
      </form>

      <p id="convoyResult" class="result"></p>

      <label>Active convoy</label>
      <select id="activeConvoySelect"></select>

      <div class="row gap small-top">
        <button id="loadMembersBtn" type="button">Load Members</button>
        <button id="loadGpsBtn" type="button">Load GPS</button>
      </div>

      <div id="membersList" class="list-box"></div>
      <div id="gpsList" class="list-box"></div>
    </section>

    <!-- FRIENDS -->
    <section class="card">
      <h2>Friends</h2>

      <form id="friendRequestForm" class="stack">
        <input id="friendUsername" placeholder="Friend username" required />
        <button type="submit">Send Friend Request</button>
      </form>

      <div class="row gap small-top">
        <button id="showFriendsBtn" type="button">Show Friends</button>
        <button id="showRequestsBtn" type="button">Show Requests</button>
        <button id="toggleBlockedBtn" type="button">Show Blocked Users</button>
      </div>

      <p id="friendResult" class="result"></p>

      <div id="friendsList" class="list-box"></div>
      <div id="requestsList" class="list-box"></div>
    </section>

    <!-- MESSAGING -->
    <section class="card wide">
      <h2>Messaging</h2>
      <div class="contacts-layout">
        <div>
          <h3>Contacts</h3>

          <div class="row gap small-top">
            <button type="button" id="showDirectBtn">Direct Messages</button>
            <button type="button" id="showGroupsBtn">Group Chats</button>
          </div>

          <div id="groupCreateBox" class="list-box" style="display: none;">
            <h3>Create Group</h3>

            <form id="createGroupForm" class="stack">
              <input id="groupNameInput" placeholder="Group name" />
              <div id="groupMembersPick" class="stack"></div>
              <button type="submit">Create Group</button>
            </form>
          </div>

          <div id="contactsList" class="list-box contacts"></div>
        </div>

        <div id="chatPanel" style="display: none;">
          <h3 id="chatTitle"></h3>

          <button id="leaveGroupBtn" style="display:none; margin-bottom:10px;">
            Leave Group
          </button>

          <div id="messagesBox" class="messages-box"></div>

          <form id="messageForm" class="row gap small-top">
            <input id="messageInput" placeholder="Type a message" />
            <button type="submit">Send</button>
          </form>
        </div>
      </div>
    </section>

    <!-- GPS -->
    <section class="card wide">
      <h2>GPS</h2>
      <div class="row gap wrap">
        <button id="shareLocationBtn" type="button">Share My Location</button>
      </div>
      <p id="gpsResult" class="result"></p>
    </section>

  </main>

  <script type="module" src="./app.js"></script>

</body>
</html>
